<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; color: #334155; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header { background: #10b981; padding: 40px; text-align: center; color: white; }
        .content { padding: 40px; text-align: center; }
        .code { font-size: 48px; font-weight: 800; color: #10b981; letter-spacing: 12px; margin: 30px 0; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #64748b; background: #f8fafc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DataMine</h1>
        </div>
        <div class="content">
            <h2>Verify Your Email</h2>
            <p>Your verification code for the DataMine platform is:</p>
            <div class="code">{{ otp }}</div>
            <p>This code expires in 10 minutes. If you didn't request this, you can safely ignore this email.</p>
        </div>
        <div class="footer">
            &copy; 2026 DataMine Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
