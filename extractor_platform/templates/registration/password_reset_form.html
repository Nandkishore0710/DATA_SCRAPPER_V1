{% extends "admin/base.html" %}
{% block content %}
<div style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: #10b981; font-weight: 800; margin-bottom: 10px;">DataMine</h1>
            <p style="color: #64748b; font-size: 0.95rem;">Enter your email to reset your password.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label for="id_email" style="display: block; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 8px;">Email Address</label>
                <input type="email" name="email" maxlength="254" required id="id_email" placeholder="you@example.com"
                    style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; outline: none; transition: all 0.2s; background: #f8fafc;">
            </div>
            <button type="submit" 
                style="width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);">
                Send Reset Link
            </button>
        </form>
        <div style="margin-top: 25px; text-align: center;">
            <a href="{% url 'admin_hub_login' %}" style="color: #10b981; text-decoration: none; font-size: 0.9rem; font-weight: 600;">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
