<div class="sidebar">
    <div style="padding: 24px 24px;">
        <img src="/static/images/logo.png" alt="Logo" style="width: 150px; display: block;">
    </div>
    
    <div style="padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 12px; display: flex; align-items: center; gap: 12px;">
        <div id="user-avatar-btn" style="width: 32px; height: 32px; background: var(--accent); border-radius: 6px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem;">A</div>
        <div>
            <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-main);" id="sidebar-username">Admin User</div>
            <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
                <span id="sidebar-package-badge" style="display:none; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), #6366f1); color: white;"></span>
                <span id="sidebar-package-free" style="font-size: 0.65rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Google Drive Storage Widget -->
    <div id="gdrive-widget" style="padding: 0 16px 16px; margin-bottom: 4px;">

        <!-- Not connected state -->
        <div id="gdrive-disconnected" style="display:flex; align-items:center; gap:10px; padding: 10px 12px; border-radius: 10px; border: 1px dashed var(--border); cursor:pointer; transition: all 0.2s;" onclick="connectGoogleDrive()" onmouseover="this.style.borderColor='#4285f4'; this.style.background='rgba(66,133,244,0.04)'" onmouseout="this.style.borderColor='var(--border)'; this.style.background='transparent'">
            <svg width="18" height="18" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
                <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
                <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
                <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
                <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
                <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>
            <div style="flex:1; min-width:0;">
                <div style="font-size:0.75rem; font-weight:700; color:var(--text-main);">Google Drive</div>
                <div style="font-size:0.62rem; color:var(--text-muted); font-weight:500;">Connect to save exports</div>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <!-- Connected state -->
        <div id="gdrive-connected" style="display:none; padding: 12px; background: rgba(16, 185, 129, 0.04); border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 12px;">
            <div style="margin-bottom: 12px;">
                <div style="font-size: 0.65rem; font-weight: 700; color: #10b981; text-transform: none; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;">
                    <span>Manage Google storage</span>
                    <button onclick="disconnectGoogleDrive()" title="Disconnect" style="background:none; border:none; cursor:pointer; color:var(--text-light); padding:2px; border-radius:4px; transition:0.15s" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-light)'">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div id="gdrive-storage-text" style="font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">0 MB of 0 GB used</div>
                <div style="width:100%; height:6px; background: var(--border-light); border-radius:10px; overflow:hidden; border: 1px solid var(--border-light);">
                    <div id="gdrive-storage-bar" style="width:0%; height:100%; background: #10b981; border-radius:10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);"></div>
                </div>
                <div id="gdrive-storage-free" style="font-size: 0.65rem; color: var(--text-muted); margin-top: 6px; font-weight: 600;">Calculating...</div>
            </div>

            <div style="border-top: 1px solid rgba(16, 185, 129, 0.1); padding-top: 10px;">
                <div style="font-size: 0.75rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px;">Google Account</div>
                <div id="gdrive-email" style="font-size: 0.7rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">email@example.com</div>
            </div>
        </div>

    </div>

    <div class="nav-menu">
        <a class="nav-item active" id="nav-dashboard" onclick="switchNav('dashboard')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>Scraper</span>
        </a>
        <a class="nav-item" id="nav-history" onclick="switchNav('history')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <span>History</span>
        </a>
        <a class="nav-item" id="nav-packages" onclick="switchNav('packages')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
            <span>Packages</span>
        </a>
        <a class="nav-item" id="nav-settings" onclick="switchNav('settings')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
            <span>Settings</span>
        </a>
        
    </div>

    <div style="margin-top: auto; padding: 24px; border-top: 1px solid var(--border);">
        <div style="display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 0.8rem; font-weight: 600;">
            <span>Dark Appearance</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>
