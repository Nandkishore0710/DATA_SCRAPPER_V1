{% extends "admin/base.html" %}
{% block content %}
<div style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 450px;">
        <div style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2 style="color: #334155; font-weight: 800; margin-bottom: 15px;">Successfully Reset</h2>
        <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">
            Your password has been changed successfully. You can now log in with your new password.
        </p>
        <div style="padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <a href="{% url 'admin_hub_login' %}" 
                style="display: block; width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); text-decoration: none;">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
