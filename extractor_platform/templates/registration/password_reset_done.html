{% extends "admin/base.html" %}
{% block content %}
<div style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 450px;">
        <div style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
        </div>
        <h2 style="color: #334155; font-weight: 800; margin-bottom: 15px;">Email Sent</h2>
        <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">
            A password reset email has been sent to your inbox. Please check your email (including spam) and follow the link to reset your account.
        </p>
        <div style="padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <a href="{% url 'admin_hub_login' %}" style="color: #10b981; text-decoration: none; font-weight: 700; font-size: 0.95rem;">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
