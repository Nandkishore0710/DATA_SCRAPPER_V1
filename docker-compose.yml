services:
  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - extractor_net

  worker:
    build: .
    command: celery -A core worker --loglevel=info --concurrency=2
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - extractor_net

  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - extractor_net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - extractor_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - extractor_net

volumes:
  postgres_data:

networks:
  extractor_net:
